<div class="group-page">

  <div class="group-header">
    <h2>My Groups</h2>
    <button class="create-btn" routerLink="/dashboard/groups/create">
      + Start a New Group
    </button>
  </div>

  <div *ngIf="groups.length === 0" class="empty">
    No groups found.
  </div>

  <div class="group-grid">
    <div class="group-card" *ngFor="let group of groups">

      <div class="group-data">
        <h3>{{ group.groupName }}</h3>
        <p>{{ group.description || 'No description available' }}</p>
      </div>


      <!-- ACTION BUTTONS -->
      <div class="action-row">

        <!-- DETAILS -->
        <button class="icon-btn view"
                [routerLink]="['/dashboard/groups/details', group.groupId]">
          <i class="fas fa-eye"></i>
        </button>

        <!-- EDIT -->
        <button class="icon-btn edit"
                [routerLink]="['/dashboard/groups/edit', group.groupId]">
          <i class="fas fa-pen"></i>
        </button>

        <!-- DELETE -->
        <button class="icon-btn delete"
                (click)="deleteGroup(group.groupId)">
          <i class="fas fa-trash"></i>
        </button>

      </div>

    </div>
  </div>

</div>
