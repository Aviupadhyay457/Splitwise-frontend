<div class="form-div">
    <div class="form-header">
        <img src="assets/png/moneysplit-logo-2.png">
        <h1>Set new password</h1>
    </div>

    <form class="form" (ngSubmit)="OnFormSubmitted(resetForm)" #resetForm="ngForm">

        <div class="passwords-container">

            <div class="form-element">
                <div class="label-container">
                    <label for="newPassword">New Password</label>
                    <i class="fa-solid fa-eye" (click)="hidePass()" *ngIf="passwordType==='text' && newPassword.dirty" [ngStyle]="{color:(newPassword.valid && newPassword.dirty)?'#9147FF':'#f25022'}"></i>
                    <i class="fa-solid fa-eye-slash" (click)="showPass()" *ngIf="passwordType==='password' && newPassword.dirty" [ngStyle]="{color:(newPassword.valid && newPassword.dirty)?'#9147FF':'#f25022'}"></i>
                </div>

                <input [type]="passwordType" name="newPassword" id="newPassword"
                    minlength="8"
                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"
                    [(ngModel)]="passwordForChecks" required #newPassword="ngModel" />

                <ul *ngIf="newPassword.dirty">
                    <li [ngClass]="{'password-validation-mark': lowerCaseValidation(passwordForChecks)}">One lowercase character</li>
                    <li [ngClass]="{'password-validation-mark': upperCaseValidation(passwordForChecks)}">One uppercase character</li>
                    <li [ngClass]="{'password-validation-mark': numberValidation(passwordForChecks)}">One Number</li>
                    <li [ngClass]="{'password-validation-mark': specialCharValidation(passwordForChecks)}">One Special character</li>
                    <li [ngClass]="{'password-validation-mark': lengthValidation(passwordForChecks)}">8 characters minimum</li>
                </ul>
            </div>

            <div class="form-element" *ngIf="checkAllValidation(passwordForChecks)">
                <div class="label-container">
                    <label for="confirmPassword">Confirm Password</label>
                    <i class="fa-solid fa-circle-xmark" *ngIf="confirmPassword.dirty && newPassword.value !== confirmPassword.value"></i>
                    <i class="fa-solid fa-circle-check" *ngIf="confirmPassword.dirty && newPassword.value === confirmPassword.value"></i>
                </div>
                <input type="password" name="confirmPassword" id="confirmPassword"
                    [ngStyle]="{borderColor: confirmPassword.dirty && newPassword.value === confirmPassword.value ? '#9147FF' : (confirmPassword.dirty ? '#f25022' : '')}"
                    ngModel required #confirmPassword="ngModel" />
            </div>

        </div>

        <input
            type="submit"
            [value]="isLoading ? 'Resetting...' : 'Reset Password'"
            class="reset-btn"
            [disabled]="resetForm.invalid || resetForm.controls['newPassword']?.value !== resetForm.controls['confirmPassword']?.value || isLoading"
            [ngClass]="{'reset-btn-disabled': resetForm.invalid || resetForm.controls['newPassword']?.value !== resetForm.controls['confirmPassword']?.value || isLoading}" />

    </form>

    <div class="back-to-login">
        <a routerLink="/Login">&#8592; Back to login</a>
    </div>
</div>
