<!-- <app-header></app-header> -->
<div class="page-content">
    <div class="form-div">
        <div class="form-header" *ngIf="!response">
            <img src="assets/png/moneysplit-logo-2.png">
            <h1>Reset your password</h1>
        </div>

        <ng-container *ngIf="!response">
            <p class="subtitle">Enter your email address and we'll send you a link to reset your password.</p>
            <form (ngSubmit)="OnFormSubmitted(forgotForm)" #forgotForm="ngForm">
                <div class="form-element">
                    <div class="label-container">
                        <label for="email">Email</label>
                        <i class="fa-solid fa-circle-xmark" *ngIf="resetEmail.invalid && resetEmail.dirty"></i>
                        <i class="fa-solid fa-circle-check" *ngIf="resetEmail.valid && resetEmail.dirty"></i>
                    </div>
                    <input type="email" name="email" id="email" ngModel required email #resetEmail="ngModel" />
                </div>
                <input
                    type="submit"
                    [value]="isLoading ? 'Sending...' : 'Reset Password'"
                    class="reset-btn"
                    [ngClass]="{'reset-btn-disabled': forgotForm.invalid || isLoading}"
                />
            </form>
        </ng-container>

        <div class="success-card" *ngIf="response">
            <div class="success-icon-wrapper">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h2>Check your inbox</h2>
            <p class="success-message">{{ response.message }}</p>
            <p class="success-note">Didn't receive it? Check your spam folder.</p>
        </div>

        <div class="back-to-login">
            <a routerLink="/Login">&#8592;  Back to login</a>
        </div>
    </div>
</div>
