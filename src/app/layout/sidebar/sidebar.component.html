<nav class="sidebar">

  <!-- Brand -->
  <div class="sidebar-brand">
    <img src="assets/png/moneysplit-logo-3.png" alt="MoneySplit" class="brand-logo" />
  </div>

  <!-- Navigation -->
  <div class="sidebar-nav">
    <p class="nav-section-label">Navigation</p>
    <ul>
      <li>
        <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
          <i class="fa-solid fa-house"></i>
          <span>Dashboard</span>
        </a>
      </li>
      <li>
        <a routerLink="/dashboard/groups" routerLinkActive="active">
          <i class="fa-solid fa-users"></i>
          <span>Groups</span>
        </a>
      </li>
      <li>
        <a routerLink="/dashboard/activity" routerLinkActive="active">
          <i class="fa-solid fa-chart-line"></i>
          <span>Activity</span>
        </a>
      </li>
      <li>
        <a routerLink="/dashboard/friends" routerLinkActive="active">
          <i class="fa-solid fa-user-group"></i>
          <span>Friends</span>
        </a>
      </li>
    </ul>
  </div>

  <!-- User Card -->
  <div class="sidebar-user">

    <!-- Popover menu -->
    <div class="user-popover" *ngIf="popoverOpen">
      <button class="popover-item" (click)="goToAccount()">
        <i class="fa-solid fa-user"></i>
        <span>Account</span>
      </button>
      <div class="popover-divider"></div>
      <button class="popover-item popover-item-logout" (click)="requestLogout()">
        <i class="fa-solid fa-arrow-right-from-bracket"></i>
        <span>Log out</span>
      </button>
    </div>

    <div
      class="user-card"
      [class.active]="isAccountRoute()"
      (click)="togglePopover()">
      <div class="user-avatar">{{ getUserInitials() }}</div>
      <div class="user-info">
        <span class="user-name">{{ userName }}</span>
        <span class="user-email">{{ userEmail }}</span>
      </div>
      <i class="fa-solid fa-sort user-sort-icon"></i>
    </div>

  </div>

</nav>

<!-- Logout confirmation modal -->
<div class="logout-overlay" *ngIf="logoutConfirming" (click)="cancelLogout()">
  <div class="logout-modal" (click)="$event.stopPropagation()">
    <div class="logout-modal-icon">
      <i class="fa-solid fa-arrow-right-from-bracket"></i>
    </div>
    <h3 class="logout-modal-title">Log out?</h3>
    <p class="logout-modal-body">You'll need to sign in again to access your account.</p>
    <div class="logout-modal-actions">
      <button class="btn-logout-cancel" (click)="cancelLogout()">Cancel</button>
      <button class="btn-logout-confirm" (click)="confirmLogout()">Yes, log out</button>
    </div>
  </div>
</div>
